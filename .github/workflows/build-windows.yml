name: Build 坚果远程 Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          cd $env:USERPROFILE\vcpkg
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          .\vcpkg.exe install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --recurse

      - name: Download Sciter
        run: |
          New-Item -ItemType Directory -Force -Path target\release
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/c-smile/sciter-sdk/master/bin.win/x64/sciter.dll" -OutFile "target\release\sciter.dll"

      - name: 修改服务器和名称
        run: |
          (Get-Content libs/hbb_common/src/config.rs -Raw) -replace 'DEFAULT_RENDEZVOUS_SERVER.*?;', 'DEFAULT_RENDEZVOUS_SERVER: &str = "askair.cn";' | Set-Content libs/hbb_common/src/config.rs
          (Get-Content Cargo.toml) -replace 'name = "rustdesk"', 'name = "坚果远程"' | Set-Content Cargo.toml
          Write-Host "✅ 修改完成: askair.cn + 坚果远程"

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: 打包绿色版（管理员权限）
        run: |
          Copy-Item "target\x86_64-pc-windows-msvc\release\rustdesk.exe" -Destination "坚果远程.exe"
          Copy-Item "坚果远程.exe" -Destination "坚果远程-qs.exe"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 坚果远程-Windows-绿色版
          path: |
            坚果远程.exe
            坚果远程-qs.exe
